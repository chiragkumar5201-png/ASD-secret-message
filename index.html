<div class="bg-dots"></div>
<div class="vault-card">
  <div class="icon" id="vault-icon">🔒</div>
  <h1>ASD's Secret Message</h1>

  <div id="setup-view" class="fade-in">
    <textarea id="note-input" placeholder="Enter your secret message..."></textarea>
    <input type="password" id="pass-input" placeholder="Create a password">
    <button onclick="generateLink()">Lock & Generate Link</button>
  </div>

  <div id="share-view" style="display:none;" class="fade-in">
    <p>Note Encrypted!</p>
    <input type="text" id="share-url" readonly onclick="this.select()">
    <button onclick="copyLink()">Copy Link to Share</button>
  </div>

  <div id="locked-view" style="display: none;" class="fade-in">
    <p class="status">This link contains a secret.</p>
    <input type="password" id="unlock-pass" placeholder="Enter password">
    <button onclick="unlockNote()">Decrypt Note</button>
    <div id="reveal-area" style="display: none;"></div>
  </div>
</div>
